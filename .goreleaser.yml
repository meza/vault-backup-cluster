version: 2

project_name: vault-backup-cluster

before:
  hooks:
    - go mod download

builds:
  - id: vault-backup-cluster
    main: ./cmd/vault-backup-cluster
    binary: vault-backup-cluster
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  disable: true

dockers:
  - id: vault-backup-cluster-linux-amd64
    ids:
      - vault-backup-cluster
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.release
    use: buildx
    image_templates:
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:{{ .Tag }}-amd64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}-amd64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}.{{ .Minor }}-amd64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:latest-amd64
    build_flag_templates:
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Version }}
  - id: vault-backup-cluster-linux-arm64
    ids:
      - vault-backup-cluster
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.release
    use: buildx
    image_templates:
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:{{ .Tag }}-arm64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}-arm64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}.{{ .Minor }}-arm64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:latest-arm64
    build_flag_templates:
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Version }}

docker_manifests:
  - name_template: docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:{{ .Tag }}
    image_templates:
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:{{ .Tag }}-amd64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:{{ .Tag }}-arm64
  - name_template: docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}
    image_templates:
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}-amd64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}-arm64
  - name_template: docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}.{{ .Minor }}
    image_templates:
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}.{{ .Minor }}-amd64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:v{{ .Major }}.{{ .Minor }}-arm64
  - name_template: docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:latest
    image_templates:
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:latest-amd64
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster:latest-arm64
