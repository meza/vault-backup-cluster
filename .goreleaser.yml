version: 2

project_name: vault-backup-cluster

before:
  hooks:
    - go mod download

builds:
  - id: vault-backup-cluster
    main: ./cmd/vault-backup-cluster
    binary: vault-backup-cluster
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  disable: true

dockers_v2:
  - id: vault-backup-cluster-linux
    ids:
      - vault-backup-cluster
    dockerfile: Dockerfile.release
    images:
      - docker.io/{{ .Env.DOCKER_USER }}/vault-backup-cluster
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - latest
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
