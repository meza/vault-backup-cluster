name: release

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true
          version: ~> v2

      - name: Run semantic-release
        env:
          DOCKER_USER: ${{ vars.DOCKER_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npx
          -p semantic-release@25.0.3
          -p @semantic-release/changelog@6.0.3
          -p @semantic-release/exec@7.1.0
          -p @semantic-release/git@10.0.1
          -p conventional-changelog-conventionalcommits@9.1.0
          semantic-release
